name: pet_first
description: Pet First - Emergency First Aid for Dogs and Cats
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  cloud_firestore: ^6.0.0
  cloud_functions: ^6.0.0
  cupertino_icons: ^1.0.2
  dots_indicator: ^4.0.1
  firebase_app_check: ^0.4.1+4
  firebase_auth: ^6.1.4
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.0
  flutter:
    sdk: flutter
  flutter_foundation:
    git:
      url: https://github.com/crelve/flutter_foundation.git
      ref: main
  flutter_hooks: ^0.21.0
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.3.2
  go_router: ^17.0.1
  hooks_riverpod: ^3.0.0
  package_info_plus: ^9.0.0
  path: ^1.8.3
  purchases_flutter: ^9.10.1
  share_plus: ^12.0.1
  shared_preferences: ^2.5.2

dev_dependencies:
  build_runner: ^2.4.7
  flutter_gen_runner: ^5.10.0
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  # flutterfire_cli はグローバルインストールで使用: dart pub global activate flutterfire_cli
  freezed: ^3.2.3
  go_router_builder: ^4.1.3
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  pedantic_mono: 1.34.0 # 1.35.0のlintルールはDart 3.10で未サポート
  riverpod: ^3.0.3
  riverpod_generator: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/image/

flutter_launcher_icons:
  android: false
  ios: true
  image_path: "assets/image/logoIcon.png"
  remove_alpha_ios: true

# make create-native-splashで反映されます
flutter_native_splash:
  color: "FFFFFF"
  image: "assets/image/logoIcon.png"
  color_dark: "FFFFFF"
  image_dark: "assets/image/logoIcon.png"
  fullscreen: true

flutter_gen:
  output: lib/gen/

  colors:
    inputs:
      - assets/color/colors.xml
