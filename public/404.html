<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Flutter Template</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .emoji {
      font-size: 64px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 72px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 8px;
    }
    h2 {
      font-size: 24px;
      font-weight: 600;
      color: #424245;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      color: #86868b;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      display: inline-block;
      padding: 12px 24px;
      background: #0066cc;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .links a:hover {
      background: #0055b3;
    }
    .links a.secondary {
      background: #fff;
      color: #0066cc;
      border: 1px solid #d2d2d7;
    }
    .links a.secondary:hover {
      background: #f5f5f7;
    }
    @media (max-width: 480px) {
      h1 { font-size: 56px; }
      h2 { font-size: 20px; }
      .links { flex-direction: column; }
      .links a { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">📱</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div class="links">
      <a href="terms.html">Terms of Use</a>
      <a href="privacy.html" class="secondary">Privacy Policy</a>
    </div>
  </div>
</body>
</html>
