name: Generate Screenshots

# 手動トリガーのみ（Step 16で session-build が呼び出す）
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Screenshot mode: full (39 languages, ~60min) or quick (ja+en-US, ~5min)'
        required: false
        default: 'quick'
        type: choice
        options:
          - quick
          - full

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true

jobs:
  screenshots:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup project
        run: |
          export PATH="$HOME/fvm/default/bin:$PATH"
          flutter pub get
          dart pub get
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n

      - name: Install Fastlane dependencies
        run: |
          export PATH="$HOME/.rbenv/shims:$PATH"
          bundle install

      - name: Prepare Flutter iOS config
        run: |
          export PATH="$HOME/fvm/default/bin:$PATH"
          flutter build ios --config-only --release --no-codesign

      - name: Install Pods
        working-directory: ios
        run: |
          export PATH="$HOME/.rbenv/shims:$PATH"
          pod install --repo-update

      - name: Cleanup stale simulators
        run: |
          xcrun simctl shutdown all 2>/dev/null || true
          find /var/folders -maxdepth 6 -name 'flutter_test_listener.*' -type f -mmin +30 -delete 2>/dev/null || true

      - name: Generate screenshots (quick)
        if: inputs.mode == 'quick'
        run: |
          export PATH="$HOME/.rbenv/shims:$HOME/fvm/default/bin:$PATH"
          cd ios
          for attempt in 1 2; do
            if bundle exec fastlane take_screenshots_quick; then
              exit 0
            fi
            echo "::warning::Screenshot attempt $attempt failed, cleaning up simulators and retrying..."
            xcrun simctl shutdown all 2>/dev/null || true
            sleep 5
          done
          exit 1

      - name: Generate screenshots (full - 39 languages)
        if: inputs.mode == 'full'
        run: |
          export PATH="$HOME/.rbenv/shims:$HOME/fvm/default/bin:$PATH"
          cd ios
          for attempt in 1 2; do
            if bundle exec fastlane take_screenshots; then
              exit 0
            fi
            echo "::warning::Screenshot attempt $attempt failed, cleaning up simulators and retrying..."
            xcrun simctl shutdown all 2>/dev/null || true
            sleep 5
          done
          exit 1

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ inputs.mode }}-${{ github.run_id }}
          path: screenshots/
          retention-days: 30
          if-no-files-found: warn
